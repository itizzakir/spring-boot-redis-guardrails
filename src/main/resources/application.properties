spring.application.name=core-api

# Default DB is MySQL because this machine already has that password.
# For the PDF's PostgreSQL setup, run with: --spring.profiles.active=postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/grid07_assignment?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Zakir@123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

app.notifications.sweep-rate-ms=${NOTIFICATION_SWEEP_RATE_MS:300000}
app.seed-demo-data=${SEED_DEMO_DATA:true}

server.port=${SERVER_PORT:8080}
